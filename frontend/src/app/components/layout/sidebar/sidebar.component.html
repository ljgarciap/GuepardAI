<div class="sidebar">
  <div class="logo-area">
    <div class="logo-wrapper-elite">
      <img src="logo.png" alt="Identity" class="brand-logo-elite">
    </div>
    <div class="logo-text-elite">
      <h2>GUEPARD</h2>
      <p class="brand-subtitle-elite">Strategic Systems</p>
    </div>
  </div>

  <nav class="nav-menu">
    <div class="nav-section-label">STRATEGY</div>
    <a routerLink="/directory" routerLinkActive="active" class="nav-item-elite">
      <span class="nav-icon-elite">⊞</span>
      <span class="nav-link">Brand Directory</span>
    </a>
    <a routerLink="/library" routerLinkActive="active" class="nav-item-elite">
      <span class="nav-icon-elite">🗃️</span>
      <span class="nav-link">Strategic Assets</span>
    </a>
    <div class="nav-section-spacer"></div>
    <div class="nav-section-label">OPERATIONS</div>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-item-elite">
      <span class="nav-icon-elite">◈</span>
      <span class="nav-link">Synthesis Studio</span>
    </a>
    <a routerLink="/brands" routerLinkActive="active" class="nav-item-elite">
      <span class="nav-icon-elite">◇</span>
      <span class="nav-link">Intelligence Hub</span>
    </a>
  </nav>

  <div class="sidebar-footer">
    <div class="user-profile-lite">
      <div class="user-avatar-elite">S</div>
      <div class="user-info-elite">
        <span class="user-name-elite">Super Admin</span>
        <span class="user-role-elite">System Architect</span>
      </div>
    </div>
    <p class="footer-text-elite">Platform v1.0 • © 2026</p>
  </div>
</div>
