version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: guepard-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ai_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: always

  backend:
    build: ./backend
    container_name: guepard-backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    environment:
      - DATABASE_URL=postgresql+psycopg://root:root@db:5432/ai_db
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
    restart: always

  frontend:
    build: ./frontend
    container_name: guepard-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  vision:
    image: ollama/ollama:latest
    container_name: guepard-vision
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: always

  init-vision:
    image: curlimages/curl:latest
    container_name: guepard-vision-init
    depends_on:
      - vision
    restart: "no"
    command: >
      sh -c "
      echo 'Waiting for Ollama to start...';
      sleep 10;
      echo 'Pulling MiniCPM-V model...';
      curl -s -X POST http://vision:11434/api/pull -d '{\"name\": \"minicpm-v\"}';
      echo 'Model pulled successfully!';
      "

volumes:
  pgdata:
  ollama_data:
