<!-- PILLARS LAYOUT -->
<div class="flex flex-col h-full p-16 relative z-10">
    <div class="flex items-center gap-4 mb-6">
        <div class="h-accent"></div>
        <span class="text-brand-secondary font-bold tracking-[0.2em] text-xs uppercase">{{ slide.section_label }}</span>
    </div>

    <h1 class="text-4xl font-extrabold text-white mb-12 leading-[1.1] tracking-tight max-w-4xl">
        {{ slide.title }}
    </h1>

    <div class="flex justify-between gap-8 flex-grow">
        {% for bullet in slide.bullets %}
        <div class="glass rounded-3xl p-8 flex flex-col" style="width: 30%;">
            <div class="w-12 h-12 bg-brand-secondary/20 rounded-2xl flex items-center justify-center mb-6">
                <div class="w-3 h-3 rounded-full bg-brand-secondary" style="width: 12px; height: 12px;"></div>
            </div>
            <p class="text-lg text-slate-300 leading-relaxed">
                {{ bullet }}
            </p>
        </div>
        {% endfor %}
    </div>
</div>
